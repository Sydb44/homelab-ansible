- name: Install fail2ban
  ansible.builtin.package:
    name: fail2ban
    state: present

- name: Deploy fail2ban jail config
  ansible.builtin.template:
    src: fail2ban/jail.local.j2
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: '0644'
  notify: Restart fail2ban

- name: Enable and start fail2ban
  ansible.builtin.service:
    name: fail2ban
    state: started
    enabled: true

- name: Install Docker dependencies
  ansible.builtin.package:
    name:
      - ca-certificates
      - curl
    state: present

- name: Create Docker keyring directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Download Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian {{ ansible_facts['distribution_release'] }} stable"
    state: present

- name: Install Docker
  ansible.builtin.package:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present

- name: Add user to docker group
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true

- name: Enable and start Docker
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Install UFW
  ansible.builtin.package:
    name: ufw
    state: present

- name: Allow SSH
  community.general.ufw:
    rule: allow
    port: '22'
    proto: tcp

- name: Allow HTTP
  community.general.ufw:
    rule: allow
    port: '80'
    proto: tcp

- name: Allow HTTPS
  community.general.ufw:
    rule: allow
    port: '443'
    proto: tcp

- name: Allow node-exporter
  community.general.ufw:
    rule: allow
    port: '9100'
    proto: tcp

- name: Allow Flannel VXLAN
  community.general.ufw:
    rule: allow
    port: '8472'
    proto: udp

- name: Allow WireGuard Flannel
  community.general.ufw:
    rule: allow
    port: '51820'
    proto: udp

- name: Enable UFW
  community.general.ufw:
    state: enabled
    policy: deny

- name: Create directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /opt/homelab
    - /opt/homelab/traefik
    - /opt/homelab/vaultwarden
    - /opt/homelab/nextcloud
    - /opt/homelab/gitea
    - /opt/homelab/paperless
    - /opt/homelab/uptime-kuma

- name: Deploy Traefik Docker proxy config
  ansible.builtin.template:
    src: traefik/docker-proxy.conf.j2
    dest: /opt/homelab/traefik/docker-proxy.conf
    mode: '0644'

- name: Deploy Traefik env file
  ansible.builtin.template:
    src: traefik/env.j2
    dest: /opt/homelab/traefik/.env
    mode: '0600'

- name: Deploy Traefik Compose
  ansible.builtin.template:
    src: traefik/docker-compose.yml.j2
    dest: /opt/homelab/traefik/docker-compose.yml
    mode: '0644'

- name: Deploy Vaultwarden Compose
  ansible.builtin.template:
    src: vaultwarden/docker-compose.yml.j2
    dest: /opt/homelab/vaultwarden/docker-compose.yml
    mode: '0644'

- name: Deploy Gitea Compose
  ansible.builtin.template:
    src: gitea/docker-compose.yml.j2
    dest: /opt/homelab/gitea/docker-compose.yml
    mode: '0644'

- name: Deploy Nextcloud Compose
  ansible.builtin.template:
    src: nextcloud/docker-compose.yml.j2
    dest: /opt/homelab/nextcloud/docker-compose.yml
    mode: '0644'

- name: Deploy Paperless Compose
  ansible.builtin.template:
    src: paperless/docker-compose.yml.j2
    dest: /opt/homelab/paperless/docker-compose.yml
    mode: '0644'

- name: Deploy Uptime Kuma Compose
  ansible.builtin.template:
