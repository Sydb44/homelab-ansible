    mode: '0644'

- name: Create prometheus directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /opt/homelab/prometheus/config
    - /opt/homelab/prometheus/data
    - /opt/homelab/grafana/data

- name: Set prometheus data directory ownership
  ansible.builtin.file:
    path: /opt/homelab/prometheus/data
    owner: '65534'
    group: '65534'
    state: directory
    mode: '0755'

- name: Set grafana data directory ownership
  ansible.builtin.file:
    path: /opt/homelab/grafana/data
    owner: '472'
    group: '472'
    state: directory
    mode: '0755'

- name: Deploy Prometheus config
  ansible.builtin.template:
    src: prometheus/prometheus.yml.j2
    dest: /opt/homelab/prometheus/config/prometheus.yml
    mode: '0644'

- name: Deploy Prometheus Compose
  ansible.builtin.template:
    src: prometheus/docker-compose.yml.j2
    dest: /opt/homelab/prometheus/docker-compose.yml
    mode: '0644'

- name: Deploy Grafana Compose
  ansible.builtin.template:
    src: grafana/docker-compose.yml.j2
    dest: /opt/homelab/grafana/docker-compose.yml
    mode: '0644'

- name: Create node-exporter directory
  ansible.builtin.file:
    path: /opt/homelab/node-exporter
    state: directory
    mode: '0755'

- name: Deploy node-exporter Compose
  ansible.builtin.template:
    src: node-exporter/docker-compose.yml.j2
