- name: Install Docker dependencies
  ansible.builtin.package:
    name:
      - ca-certificates
      - curl
    state: present

- name: Create Docker keyring directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Download Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian {{ ansible_facts['distribution_release'] }} stable"
    state: present

- name: Install Docker
  ansible.builtin.package:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present

- name: Add user to docker group
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: yes

- name: Enable and start Docker
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Install UFW                                                                                                                                 
  ansible.builtin.package:                                
    name: ufw                                                                                                                                       
    state: present    
                                                                                                                                                      
- name: Allow SSH
  community.general.ufw:                                                                                                                            
    rule: allow                                           
    port: '22'
    proto: tcp
                                              
- name: Allow HTTP                      
  community.general.ufw:
    rule: allow                                                                                                                                     
    port: '80'
    proto: tcp                                                                                                                                      
                                                            
- name: Allow HTTPS
  community.general.ufw:
    rule: allow
    port: '443'
    proto: tcp
                                              
- name: Enable UFW                      
  community.general.ufw:
    state: enabled                                                                                                                                  
    policy: deny

- name: Create directories 
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory 
    mode: '0755'
  loop:
    - /opt/homelab            
    - /opt/homelab/traefik                                                                                                                                   
    - /opt/homelab/vaultwarden                                
    - /opt/homelab/nextcloud  
    - /opt/homelab/gitea    
    - /opt/homelab/paperless
    - /opt/homelab/uptime-kuma

- name: Deploy Traefik Docker proxy config
  ansible.builtin.template:
    src: traefik/docker-proxy.conf.j2
    dest: /opt/homelab/traefik/docker-proxy.conf

- name: Deploy Traefik Compose
  ansible.builtin.template:
    src: traefik/docker-compose.yml.j2
    dest: /opt/homelab/traefik/docker-compose.yml

- name: Deploy Vaultwarden Compose
  ansible.builtin.template:
    src: vaultwarden/docker-compose.yml.j2
    dest: /opt/homelab/vaultwarden/docker-compose.yml

- name: Deploy Gitea Compose
  ansible.builtin.template:
    src: gitea/docker-compose.yml.j2
    dest: /opt/homelab/gitea/docker-compose.yml

- name: Deploy Nextcloud Compose
  ansible.builtin.template:
    src: nextcloud/docker-compose.yml.j2
    dest: /opt/homelab/nextcloud/docker-compose.yml

- name: Deploy Paperless Compose
  ansible.builtin.template:
    src: paperless/docker-compose.yml.j2
    dest: /opt/homelab/paperless/docker-compose.yml

- name: Deploy Uptime Kuma Compose
  ansible.builtin.template:
    src: uptime-kuma/docker-compose.yml.j2
    dest: /opt/homelab/uptime-kuma/docker-compose.yml

- name: Create cloudflared directory
  ansible.builtin.file:
    path: /opt/homelab/cloudflared
    state: directory
    mode: '0755'

- name: Deploy cloudflared Compose
  ansible.builtin.template:
    src: cloudflared/docker-compose.yml.j2
    dest: /opt/homelab/cloudflared/docker-compose.yml
