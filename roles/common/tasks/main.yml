- name: Install common packages
  ansible.builtin.package:
    name: "{{ common_packages }}"
    state: present
- name: Set timezone                                                                                                                                                                            
  community.general.timezone:                                                                                                                                                                   
    name: "{{ timezone }}"                                                                                                                                                                      
  notify: Restart timesyncd
- name: Set host name
  ansible.builtin.hostname:
    name: "{{ hostname }}"
